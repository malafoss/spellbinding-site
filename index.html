<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spellbinding</title>

  <meta property="og:url"         content="https://spellbinding.band">

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "MusicGroup",
    "name": "Spellbinding",
    "url": "https://spellbinding.band",
    "email": "contact@spellbinding.band",
    "sameAs": "https://www.instagram.com/spellbinding.band/",
    "foundingLocation": {
      "@type": "Place",

    }

  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      cursor: pointer;
    }

    #canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    #grain {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      z-index: 2;
      pointer-events: none;
      opacity: 0.09;
    }

    #text {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.4rem, 9vw, 7rem);
      color: #fff;
      letter-spacing: 0.07em;
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
    }

    #contact {
      position: fixed;
      bottom: 1.75rem; right: 2rem;
      z-index: 3;
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(0.6rem, 1.4vw, 0.78rem);
      color: rgba(200,200,200,0.55);
      text-decoration: none;
      letter-spacing: 0.1em;
      transition: color 0.3s;
    }
    #contact:hover { color: rgba(255,255,255,0.9); }

    #instagram {
      position: fixed;
      bottom: 1.75rem; left: 2rem;
      z-index: 3;
      font-family: 'Share Tech Mono', monospace;
      font-size: clamp(0.6rem, 1.4vw, 0.78rem);
      color: rgba(200,200,200,0.55);
      text-decoration: none;
      letter-spacing: 0.1em;
      transition: color 0.3s;
    }
    #instagram:hover { color: rgba(255,255,255,0.9); }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <canvas id="grain"></canvas>
  <div id="text">Something is forming</div>
  <a id="instagram" href="https://www.instagram.com/spellbinding.band/" target="_blank" rel="noopener">@spellbinding.band</a>
  <a id="contact" href="mailto:contact@spellbinding.band">contact@spellbinding.band</a>

  <script>
  // Copyright © 2026 Spellbinding. All rights reserved.
  (function () {
    'use strict';

    // ── Canvas ──────────────────────────────────────────────────────────────
    const canvas  = document.getElementById('canvas');
    const ctx     = canvas.getContext('2d');
    const grainEl = document.getElementById('grain');
    const gCtx    = grainEl.getContext('2d');
    const textEl  = document.getElementById('text');

    let W = 0, H = 0;
    function resize() {
      W = canvas.width = grainEl.width  = window.innerWidth;
      H = canvas.height = grainEl.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize, { passive: true });

    // ── Film grain (small offscreen, tiled up) ───────────────────────────────
    const GW = 384, GH = 256;
    const grainOff  = document.createElement('canvas');
    grainOff.width  = GW; grainOff.height = GH;
    const gOff      = grainOff.getContext('2d');
    const grainBuf  = gOff.createImageData(GW, GH);
    let   grainTick = 0;

    function updateGrain() {
      if (++grainTick % 3 !== 0) return;
      const d = grainBuf.data;
      for (let i = 0; i < d.length; i += 4) {
        const v = (Math.random() * 255) | 0;
        d[i] = d[i+1] = d[i+2] = v;
        d[i+3] = (Math.random() * 55) | 0;
      }
      gOff.putImageData(grainBuf, 0, 0);
      gCtx.clearRect(0, 0, W, H);
      gCtx.drawImage(grainOff, 0, 0, W, H);
    }

    // ── Audio ────────────────────────────────────────────────────────────────
    let ac = null, analyser = null, freqData = null, started = false;
    let sBass = 0, sFlux = 0, punch = 0;
    let kick = 0, snare = 0, hat = 0, keys = 0, pitch = 0.5;
    let prevRawKick = 0, prevRawSnare = 0;
    let kickCooldown = 0, snareCooldown = 0;
    let pitchMin = 1.0, pitchMax = 0.0;
    let prevFreqData = null;
    let bassMin = 1.0, bassMax = 0.0;
    let audioEl = null;

    async function start() {
      if (started) return;
      started = true;
      try {
        // play() must fire before new AudioContext() — on Android Chrome,
        // constructing AudioContext consumes the user gesture token first.
        audioEl = new Audio('spellcasting.m4a');
        audioEl.loop = true;
        const playPromise = audioEl.play();

        ac = new (window.AudioContext || window.webkitAudioContext)();
        analyser = ac.createAnalyser();
        analyser.fftSize = 2048;
        analyser.smoothingTimeConstant = 0.75;
        freqData = new Uint8Array(analyser.frequencyBinCount);

        const src = ac.createMediaElementSource(audioEl);
        src.connect(analyser);
        analyser.connect(ac.destination);

        await Promise.all([ac.resume(), playPromise]);
      } catch (e) {
        console.error('Audio error:', e.message);
      }
    }

    let lastInteraction = 0;
    function handleInteraction(e) {
      if (e.target.closest && e.target.closest('a')) return;
      const now = Date.now();
      if (now - lastInteraction < 500) return;
      lastInteraction = now;
      if (!started) {
        start();
      } else if (audioEl) {
        audioEl.paused ? audioEl.play() : audioEl.pause();
      }
    }

    document.addEventListener('click',   handleInteraction);
    document.addEventListener('touchend', handleInteraction);

    function readAudio() {
      if (!analyser) return;
      if (!prevFreqData) prevFreqData = new Uint8Array(freqData.length);
      analyser.getByteFrequencyData(freqData);

      // Bass: bins 1-10 (23–234 Hz)
      let b = 0;
      for (let i = 1; i <= 10; i++) b += freqData[i];
      const rawBass = b / (10 * 255);

      // Adaptive min/max — instantly tracks new extremes, decays very slowly
      if (rawBass < bassMin) bassMin = rawBass;
      else bassMin += (rawBass - bassMin) * 0.001;
      if (rawBass > bassMax) bassMax = rawBass;
      else bassMax += (rawBass - bassMax) * 0.001;

      const range   = Math.max(bassMax - bassMin, 0.04);
      const normBass = Math.max(0, Math.min(1, (rawBass - bassMin) / range));
      sBass += (normBass - sBass) * 0.2;

      // Spectral flux
      let f = 0;
      for (let i = 1; i <= 30; i++) {
        const d = freqData[i] - prevFreqData[i];
        if (d > 0) f += d;
      }
      const rawFlux = f / (30 * 255);
      sFlux += (rawFlux - sFlux) * 0.4;
      punch = Math.min(1, Math.max(punch * 0.6, rawFlux * 6));

      // Kick drum: bins 3-6 (70-140 Hz) — delta-based onset
      let k = 0;
      for (let i = 3; i <= 6; i++) k += freqData[i];
      const rawKick = k / (4 * 255);
      const kickDelta = Math.max(0, rawKick - prevRawKick);
      prevRawKick = rawKick;
      kickCooldown = Math.max(0, kickCooldown - 1);
      if (kickDelta > 0.012 && kickCooldown === 0) {
        kick = 1.0;
        kickCooldown = 18;
      } else {
        kick *= 0.78;
      }

      // Snare: bins 8-17 (188-400 Hz) — delta-based onset
      let s = 0;
      for (let i = 8; i <= 17; i++) s += freqData[i];
      const rawSnare = s / (10 * 255);
      const snareDelta = Math.max(0, rawSnare - prevRawSnare);
      prevRawSnare = rawSnare;
      snareCooldown = Math.max(0, snareCooldown - 1);
      if (snareDelta > 0.008 && snareCooldown === 0) {
        snare = 1.0;
        snareCooldown = 12;
      } else {
        snare *= 0.72;
      }

      // Keyboard pitch: peak bin in upper-mid range (bins 40-150 = 940-3515 Hz)
      // avoids bass guitar bleed in lower bins
      let peakVal = 0, pitchBin = 40;
      for (let i = 40; i <= 150; i++) {
        if (freqData[i] > peakVal) { peakVal = freqData[i]; pitchBin = i; }
      }
      const rawPitch = (pitchBin - 40) / 110;
      if (rawPitch < pitchMin) pitchMin = rawPitch;
      else pitchMin += (rawPitch - pitchMin) * 0.002;
      if (rawPitch > pitchMax) pitchMax = rawPitch;
      else pitchMax += (rawPitch - pitchMax) * 0.002;
      const normPitch = Math.max(0, Math.min(1, (rawPitch - pitchMin) / Math.max(pitchMax - pitchMin, 0.05)));
      pitch += (normPitch - pitch) * 0.1;

      // Keyboard presence (energy in pitch range) for width modulation
      let mSum = 0;
      for (let i = 20; i <= 150; i++) mSum += freqData[i];
      const rawKeys = Math.min(1, mSum / (130 * 255) * 6);
      keys += (rawKeys - keys) * 0.15;

      // Hi-hat: spectral flux in bins 150-385 (3.5-9 kHz) — heavily amplified
      let hFlux = 0;
      for (let i = 150; i <= 385; i++) {
        const d = freqData[i] - prevFreqData[i];
        if (d > 0) hFlux += d;
      }
      hat += (Math.min(1, hFlux / (235 * 255) * 40) - hat) * 0.5;

      prevFreqData.set(freqData);
    }

    // ── Molten surface ───────────────────────────────────────────────────────
    const N = 30;
    // Integer-period waves — seamless left→right wrapping
    const WAVES = [
      { p: 4, a: 10, ph: 0.0,  s: 1.0  },
      { p: 6, a:  6, ph: 1.3,  s: 0.65 },
      { p: 2, a:  8, ph: 2.5,  s: 1.4  },
      { p: 8, a:  4, ph: 0.9,  s: 0.45 },
    ];
    let mt = 0, scroll = 0;

    function sY(i) {
      const x = ((i / N) + scroll) % 1;
      let wave = 0;
      for (const w of WAVES) wave += w.a * Math.sin(x * Math.PI * 2 * w.p + w.ph + mt * w.s);
      const raw = H * 0.82 + wave * (1 + sBass * 2 + punch * 1.5 + kick * 2 + snare * 1 + keys * 1);
      return Math.max(H * 0.55, Math.min(H - 6, raw));
    }

    function drawMolten() {
      const base = H * 0.80;

      // Pool fill
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(0, H);

      let px = 0, py = sY(0);
      ctx.lineTo(px, py);
      for (let i = 1; i <= N; i++) {
        const x = (i / N) * W, y = sY(i);
        ctx.quadraticCurveTo(px, py, (px + x) / 2, (py + y) / 2);
        px = x; py = y;
      }
      ctx.lineTo(W, py);
      ctx.lineTo(W, H);
      ctx.closePath();

      const gr = ctx.createLinearGradient(0, base - 50, 0, H);
      gr.addColorStop(0,    `rgba(160,0,200,${0.08 + sBass * 0.6 + punch * 1.2})`);
      gr.addColorStop(0.18, `rgba(90,0,130,${0.55 + sBass * 0.3 + punch * 0.5})`);
      gr.addColorStop(0.55, 'rgba(25,0,45,0.88)');
      gr.addColorStop(1,    '#000');
      ctx.fillStyle   = gr;
      ctx.shadowBlur  = 18 + sBass * 28 + punch * 35;
      ctx.shadowColor = `rgba(180,0,220,${0.5 + sBass * 0.3 + keys * 0.2})`;
      ctx.fill();
      ctx.shadowBlur  = 0;
      ctx.restore();

      // Pitch-driven horizontal width: higher note = wider pool
      const halfW = W * (0.2 + pitch * 0.8);
      const fadeW = W * 0.18;
      const lEdge = W / 2 - halfW;
      const rEdge = W / 2 + halfW;
      ctx.save();
      if (lEdge + fadeW > 0) {
        const leftFade = ctx.createLinearGradient(lEdge - fadeW, 0, lEdge + fadeW, 0);
        leftFade.addColorStop(0, 'rgba(0,0,0,0.92)');
        leftFade.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = leftFade;
        ctx.fillRect(0, 0, Math.max(0, lEdge + fadeW), H);
      }
      if (rEdge - fadeW < W) {
        const rightFade = ctx.createLinearGradient(rEdge - fadeW, 0, rEdge + fadeW, 0);
        rightFade.addColorStop(0, 'rgba(0,0,0,0)');
        rightFade.addColorStop(1, 'rgba(0,0,0,0.92)');
        ctx.fillStyle = rightFade;
        ctx.fillRect(rEdge - fadeW, 0, Math.max(0, W - (rEdge - fadeW)), H);
      }
      ctx.restore();

      // Ambient heat rising from below
      ctx.save();
      const amb = ctx.createRadialGradient(W / 2, H, 0, W / 2, H, H * 0.5);
      amb.addColorStop(0,   `rgba(120,0,160,${0.05 + sBass * 0.2 + punch * 0.6})`);
      amb.addColorStop(0.6, 'transparent');
      ctx.fillStyle = amb;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }

    // ── Heat color — purple/violet spectrum ─────────────────────────────────
    function heatColor(t) {
      if (t > 0.75) {
        const p = (t - 0.75) / 0.25;
        return `rgb(${(200 + p * 40) | 0},${(80 + p * 130) | 0},255)`;
      }
      if (t > 0.50) {
        const p = (t - 0.50) / 0.25;
        return `rgb(${(160 + p * 40) | 0},${(p * 80) | 0},${(200 + p * 55) | 0})`;
      }
      if (t > 0.25) {
        const p = (t - 0.25) / 0.25;
        return `rgb(${(90 + p * 70) | 0},0,${(120 + p * 80) | 0})`;
      }
      const p = t / 0.25;
      return `rgb(${(40 + p * 50) | 0},${(10 * p) | 0},${(55 + p * 65) | 0})`;
    }

    // ── Sparks ───────────────────────────────────────────────────────────────
    const sparks = [];
    const MAX_SPARKS = 350;

    class Spark {
      constructor(x, y, e) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 2.4 * e;
        this.vy = -(1.2 + Math.random() * 3.4) * e;
        this.life  = 1;
        this.decay = 0.006 + Math.random() * 0.022;
        this.r     = 0.7 + Math.random() * 1.7;
      }
      update() {
        this.vx += (Math.random() - 0.5) * 0.08;
        this.x  += this.vx;
        this.y  += this.vy;
        this.vy += 0.065;
        this.life -= this.decay;
      }
      draw() {
        ctx.globalAlpha = this.life;
        ctx.shadowBlur  = 4 + this.life * 6;
        ctx.shadowColor = 'rgba(180,0,240,0.9)';
        ctx.fillStyle   = heatColor(this.life);
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, 6.2832);
        ctx.fill();
        ctx.shadowBlur  = 0;
        ctx.globalAlpha = 1;
      }
    }

    // ── Embers (large, slow, heavy) ──────────────────────────────────────────
    const embers = [];
    const MAX_EMBERS = 8;

    // ── Light sparks (snare-only, near-white, fast) ──────────────────────────
    const lightSparks = [];
    const MAX_LIGHT = 80;

    class LightSpark {
      constructor(x, y) {
        this.x = x; this.y = y;
        this.vx = (Math.random() - 0.5) * 5;
        this.vy = -(3 + Math.random() * 6);
        this.life  = 1;
        this.decay = 0.025 + Math.random() * 0.04;
        this.r     = 0.4 + Math.random() * 1.0;
      }
      update() {
        this.x  += this.vx;
        this.y  += this.vy;
        this.vy += 0.05;
        this.vx *= 0.97;
        this.life -= this.decay;
      }
      draw() {
        const t = this.life;
        ctx.globalAlpha = t;
        ctx.shadowBlur  = 8;
        ctx.shadowColor = `rgba(220,180,255,${t})`;
        ctx.fillStyle   = `rgb(${(200 + t * 40) | 0},${(80 + t * 130) | 0},255)`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, 6.2832);
        ctx.fill();
        ctx.shadowBlur  = 0;
        ctx.globalAlpha = 1;
      }
    }

    class Ember {
      constructor() {
        const xi = (Math.random() * N) | 0;
        this.x  = (xi / N) * W;
        this.y  = sY(xi);
        this.vx = (Math.random() - 0.5) * 0.5;
        this.vy = -(0.1 + Math.random() * 0.45);
        this.life   = 1;
        this.decay  = 0.0018 + Math.random() * 0.004;
        this.r      = 2.5 + Math.random() * 3.8;
        this.wobble = Math.random() * Math.PI * 2;
      }
      update() {
        this.wobble += 0.035;
        this.vx += Math.sin(this.wobble) * 0.04;
        this.x  += this.vx;
        this.y  += this.vy;
        this.vy += 0.004;
        this.life -= this.decay;
      }
      draw() {
        ctx.globalAlpha = this.life * 0.70;
        ctx.shadowBlur  = 14;
        ctx.shadowColor = `rgba(160,0,200,${this.life})`;
        ctx.fillStyle   = heatColor(this.life * 0.55);
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r * this.life, 0, 6.2832);
        ctx.fill();
        ctx.shadowBlur  = 0;
        ctx.globalAlpha = 1;
      }
    }

    // ── Spawn logic ──────────────────────────────────────────────────────────
    function spawnParticles(dt) {
      // Heavy sparks — hat is the primary gate
      const rate = (hat * 400 + sFlux * 20) * dt;
      const n    = Math.floor(rate) + (Math.random() < (rate % 1) ? 1 : 0);
      for (let i = 0; i < n && sparks.length < MAX_SPARKS; i++) {
        const xi = (Math.random() * N) | 0;
        const x  = (xi / N) * W + (Math.random() - 0.5) * 44;
        const y  = sY(xi) + (Math.random() - 0.5) * 12;
        const e  = 0.5 + hat * 2 + sFlux * 2 + pitch * 1.5 + Math.random() * 0.5;
        sparks.push(new Spark(x, y, e));
      }

      // Light sparks — snare is the primary gate
      const lRate = snare * 120 * dt;
      const lN    = Math.floor(lRate) + (Math.random() < (lRate % 1) ? 1 : 0);
      for (let i = 0; i < lN && lightSparks.length < MAX_LIGHT; i++) {
        const xi = (Math.random() * N) | 0;
        const x  = (xi / N) * W + (Math.random() - 0.5) * 60;
        const y  = sY(xi);
        lightSparks.push(new LightSpark(x, y));
      }

      if (embers.length < MAX_EMBERS && Math.random() < (0.03 + sBass * 0.35 + kick * 0.8) * dt * 60) {
        embers.push(new Ember());
      }
    }

    // ── Text flicker ─────────────────────────────────────────────────────────
    function flicker(t) {
      const v = 0.88 + 0.12 * (
        Math.sin(t * 0.55) * 0.5 +
        Math.sin(t * 2.1)  * 0.3 +
        Math.sin(t * 6.7)  * 0.2
      );
      textEl.style.opacity = v;
    }

    // ── Helpers ──────────────────────────────────────────────────────────────
    function tick(arr, dead) {
      for (let i = arr.length - 1; i >= 0; i--) {
        arr[i].update();
        if (dead(arr[i])) { arr.splice(i, 1); continue; }
        arr[i].draw();
      }
    }

    // ── Loop ─────────────────────────────────────────────────────────────────
    let last = 0;

    function loop(ts) {
      requestAnimationFrame(loop);
      const t  = ts * 0.001;
      const dt = Math.min(t - last, 0.05);
      last = t;

      readAudio();
      mt     += 0.008 + sBass * 0.04 + kick * 0.02;
      scroll += 0.0003 + sBass * 0.0002; // slow left drift, wraps seamlessly

      ctx.clearRect(0, 0, W, H);
      drawMolten();
      spawnParticles(dt);

      tick(embers,     p => p.life <= 0 || p.y < -30);
      tick(sparks,     p => p.life <= 0 || p.y > H + 10);
      tick(lightSparks,p => p.life <= 0 || p.y > H + 10);

      updateGrain();
      flicker(t);
    }

    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
